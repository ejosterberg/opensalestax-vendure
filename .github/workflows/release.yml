name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to publish (e.g. v1.1.0)"
        required: true
        default: "main"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm OIDC + provenance

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit (production deps, high+)
        run: npm run audit

      - name: Build
        run: npm run build

      - name: Publish to npm (OIDC, provenance)
        run: npm publish --provenance --access public
